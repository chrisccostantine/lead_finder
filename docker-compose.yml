services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: scalora_growth_engine
      POSTGRES_USER: scalora
      POSTGRES_PASSWORD: scalora_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scalora -d scalora_growth_engine"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:

